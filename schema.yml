components:
  schemas:
    Brand:
      type: object
      description: Controla las marcas de productos, evitando duplicados y nombres
        inválidos.
      properties:
        id:
          type: integer
          readOnly: true
        name_brand:
          type: string
          title: Marca
      required:
      - id
      - name_brand
    Cart:
      type: object
      description: |-
        Representa el carrito completo del usuario, incluyendo los ítems
        anidados (`RegisterCartItemSerializer`) y el total calculado.
      properties:
        id:
          type: integer
          readOnly: true
        user_name:
          type: string
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          readOnly: true
        cart:
          type: array
          items:
            $ref: '#/components/schemas/RegisterCartItem'
          readOnly: true
        total_price:
          type: string
          readOnly: true
        created_at:
          type: string
          format: date
          readOnly: true
      required:
      - cart
      - created_at
      - id
      - total_price
      - user_name
    Category:
      type: object
      description: |-
        Gestiona las categorías de producto. Se asegura que el nombre tenga mínimo
        3 caracteres y no duplique otras categorías existentes.
      properties:
        id:
          type: integer
          readOnly: true
        name_category:
          type: string
          title: Nombre de categoría
      required:
      - id
      - name_category
    ListInvoice:
      type: object
      description: Serializador simple para listar facturas existentes .
      properties:
        id:
          type: integer
          readOnly: true
        number_invoice:
          type: string
          nullable: true
          maxLength: 20
        user_first_name:
          type: string
          maxLength: 80
        user_last_name:
          type: string
          maxLength: 80
        user_document:
          type: string
          maxLength: 100
        user_provincie:
          type: string
          maxLength: 100
        user_address:
          type: string
          maxLength: 150
        created_at:
          type: string
          format: date-time
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        user:
          type: integer
      required:
      - created_at
      - id
      - user
      - user_address
      - user_document
      - user_first_name
      - user_last_name
      - user_provincie
    ListInvoiceAndDetail:
      type: object
      description: Combina factura y sus detalles en un solo serializer para vistas
        anidadas.
      properties:
        id:
          type: integer
          readOnly: true
        user_first_name:
          type: string
          readOnly: true
        user_last_name:
          type: string
          readOnly: true
        user_document:
          type: string
          readOnly: true
        user_provincie:
          type: string
          readOnly: true
        user_address:
          type: string
          readOnly: true
        invoice_details:
          type: array
          items:
            $ref: '#/components/schemas/PurchaseDetail'
          readOnly: true
        total:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
      required:
      - id
      - invoice_details
      - total
      - user_address
      - user_document
      - user_first_name
      - user_last_name
      - user_provincie
    MaritalStatusEnum:
      enum:
      - SOLTERO
      - CASADO
      - VIUDO
      type: string
      description: |-
        * `SOLTERO` - SOLTERO/A
        * `CASADO` - CASADO/A
        * `VIUDO` - VIUDO/A
    PatchedBrand:
      type: object
      description: Controla las marcas de productos, evitando duplicados y nombres
        inválidos.
      properties:
        id:
          type: integer
          readOnly: true
        name_brand:
          type: string
          title: Marca
    PatchedCategory:
      type: object
      description: |-
        Gestiona las categorías de producto. Se asegura que el nombre tenga mínimo
        3 caracteres y no duplique otras categorías existentes.
      properties:
        id:
          type: integer
          readOnly: true
        name_category:
          type: string
          title: Nombre de categoría
    PatchedProductRegister:
      type: object
      description: |-
        Serializer para el alta y la edición de productos.

        Valida nombre único, precios dentro de rango, stock y formato de imagen.
      properties:
        id:
          type: integer
          readOnly: true
        name_product:
          type: string
          title: Producto
        category_product:
          type: integer
          title: Seleccionar categoria
        category:
          type: string
          readOnly: true
        brand_product:
          type: integer
          title: Seleccionar marca
        brand:
          type: string
          readOnly: true
        price_product:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          default: '1.00'
          title: Precio
        stock_product:
          type: integer
          default: 1
          title: Stock
        image_product:
          type: string
          format: uri
          title: Imagen de producto
    PatchedRegisterCartItem:
      type: object
      description: |-
        Serializador para añadir o modificar ítems en el carrito.

        Controla la cantidad (1‑99) y calcula subtotal; se reutiliza en el
        `CartSerializer` para lista de artículos.
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
          title: Seleccionar producto
        product_name:
          type: string
          readOnly: true
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        quantity:
          type: integer
          default: 1
          title: Cantidad
        subtotal:
          type: string
          readOnly: true
    PatchedRegisterComment:
      type: object
      description: |-
        Maneja los comentarios que los usuarios dejan sobre los productos. Se
        verifica que el usuario que intenta modificar sea el autor del comentario.
      properties:
        id:
          type: integer
          readOnly: true
        user_name:
          type: string
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          readOnly: true
        product:
          type: integer
          title: Seleccionar producto
        product_name:
          type: string
          readOnly: true
        comment:
          type: string
          title: Comentario
        date:
          type: string
          format: date
          readOnly: true
    PatchedRegisterProvincie:
      type: object
      description: |-
        Serializer para registrar provincias, asegurando que
        el nombre coincida con las provincias reales de Argentina.
      properties:
        id:
          type: integer
          readOnly: true
        name_country:
          type: string
          title: Provincia
    PatchedUpdateProfileUser:
      type: object
      description: |-
        Actualiza la información del perfil del usuario, incluyendo validación
        de documentos oficiales (DNI, CUIT, Pasaporte).
      properties:
        type_document:
          allOf:
          - $ref: '#/components/schemas/TypeDocumentEnum'
          title: Tipo de documento
        document:
          type: string
          title: Identificación
        country:
          type: integer
          title: Seleccionar provincia
        address:
          type: string
          title: Domicilio
        marital_status:
          allOf:
          - $ref: '#/components/schemas/MaritalStatusEnum'
          title: Estado civil
    PatchedUpdateUser:
      type: object
      description: |-
        Permite actualizar los datos básicos del usuario (Nombre, Apellido, Email).
        Mantiene el ID y el Username como campos de solo lectura por seguridad.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          readOnly: true
        first_name:
          type: string
          title: Nombre
        last_name:
          type: string
          title: Apellido
        email:
          type: string
          format: email
          title: Correo electronico
    ProductRegister:
      type: object
      description: |-
        Serializer para el alta y la edición de productos.

        Valida nombre único, precios dentro de rango, stock y formato de imagen.
      properties:
        id:
          type: integer
          readOnly: true
        name_product:
          type: string
          title: Producto
        category_product:
          type: integer
          title: Seleccionar categoria
        category:
          type: string
          readOnly: true
        brand_product:
          type: integer
          title: Seleccionar marca
        brand:
          type: string
          readOnly: true
        price_product:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          default: '1.00'
          title: Precio
        stock_product:
          type: integer
          default: 1
          title: Stock
        image_product:
          type: string
          format: uri
          title: Imagen de producto
      required:
      - brand
      - brand_product
      - category
      - category_product
      - id
      - image_product
      - name_product
    PurchaseDetail:
      type: object
      description: Muestra los detalles (líneas) de una compra/factura.
      properties:
        id:
          type: integer
          readOnly: true
        name_product:
          type: string
          nullable: true
          maxLength: 150
        price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        quantity:
          type: integer
          maximum: 2147483647
          minimum: 0
        subtotal:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
        invoice:
          type: integer
        product:
          type: integer
      required:
      - id
      - invoice
      - price
      - product
    RegisterCartItem:
      type: object
      description: |-
        Serializador para añadir o modificar ítems en el carrito.

        Controla la cantidad (1‑99) y calcula subtotal; se reutiliza en el
        `CartSerializer` para lista de artículos.
      properties:
        id:
          type: integer
          readOnly: true
        product:
          type: integer
          title: Seleccionar producto
        product_name:
          type: string
          readOnly: true
        product_price:
          type: string
          format: decimal
          pattern: ^-?\d{0,10}(?:\.\d{0,2})?$
          readOnly: true
        quantity:
          type: integer
          default: 1
          title: Cantidad
        subtotal:
          type: string
          readOnly: true
      required:
      - id
      - product
      - product_name
      - product_price
      - subtotal
    RegisterComment:
      type: object
      description: |-
        Maneja los comentarios que los usuarios dejan sobre los productos. Se
        verifica que el usuario que intenta modificar sea el autor del comentario.
      properties:
        id:
          type: integer
          readOnly: true
        user_name:
          type: string
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          readOnly: true
        product:
          type: integer
          title: Seleccionar producto
        product_name:
          type: string
          readOnly: true
        comment:
          type: string
          title: Comentario
        date:
          type: string
          format: date
          readOnly: true
      required:
      - comment
      - date
      - id
      - product
      - product_name
      - user_name
    RegisterProvincie:
      type: object
      description: |-
        Serializer para registrar provincias, asegurando que
        el nombre coincida con las provincias reales de Argentina.
      properties:
        id:
          type: integer
          readOnly: true
        name_country:
          type: string
          title: Provincia
      required:
      - id
      - name_country
    RegisterStaffUser:
      type: object
      description: |-
        Serializer para el registro de usuarios de staff con validaciones
        estrictas de nombre, email y complejidad de contraseña.
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          title: Nombre
        last_name:
          type: string
          title: Apellido
        email:
          type: string
          format: email
          title: Correo electronico
        username:
          type: string
          title: Nombre de usuario
        password:
          type: string
          writeOnly: true
          title: Contraseña
        password2:
          type: string
          writeOnly: true
          title: Confirmar contraseña
        is_staff:
          type: boolean
          title: Usuario administrador
      required:
      - email
      - first_name
      - id
      - is_staff
      - last_name
      - password
      - password2
      - username
    RegisterUser:
      type: object
      description: |-
        Serializer para registro de clientes finales con creación
        automática de Perfil y Carrito.
      properties:
        id:
          type: integer
          readOnly: true
        first_name:
          type: string
          writeOnly: true
          title: Nombre
        last_name:
          type: string
          writeOnly: true
          title: Apellido
        email:
          type: string
          format: email
          writeOnly: true
          title: Correo electronico
        username:
          type: string
          writeOnly: true
          title: Nombre de usuario
        password:
          type: string
          writeOnly: true
          title: Contraseña
        password2:
          type: string
          writeOnly: true
          title: Confirmar contraseña
      required:
      - email
      - first_name
      - id
      - last_name
      - password
      - password2
      - username
    RegisterValorationSerialize:
      type: object
      description: |-
        Permite a un usuario registrar una valoración (1-5) para un producto. Cada
        vez que se crea, actualiza la media del producto.
      properties:
        id:
          type: integer
          readOnly: true
        user_name:
          type: string
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          readOnly: true
        product:
          type: integer
          title: Seleccionar producto
        product_name:
          type: string
          readOnly: true
        valoration:
          type: integer
          default: 1
          title: Valoración
      required:
      - id
      - product
      - product_name
      - user_name
    TokenObtainPair:
      type: object
      properties:
        username:
          type: string
          writeOnly: true
        password:
          type: string
          writeOnly: true
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          readOnly: true
      required:
      - access
      - password
      - refresh
      - username
    TokenRefresh:
      type: object
      properties:
        access:
          type: string
          readOnly: true
        refresh:
          type: string
          writeOnly: true
      required:
      - access
      - refresh
    TokenVerify:
      type: object
      properties:
        token:
          type: string
          writeOnly: true
      required:
      - token
    TypeDocumentEnum:
      enum:
      - DNI
      - CUIT
      - PAS
      type: string
      description: |-
        * `DNI` - DNI
        * `CUIT` - CUIT/CUIL
        * `PAS` - PASAPORTE
    UpdatePassword:
      type: object
      description: |-
        Serializer dedicado exclusivamente al cambio de contraseña,
        verificando la contraseña actual contra la almacenada.
      properties:
        old_password:
          type: string
          writeOnly: true
          title: Contraseña actual
        new_password:
          type: string
          writeOnly: true
          title: Nueva contraseña
        confirm_password:
          type: string
          writeOnly: true
          title: Confirmar contraseña
      required:
      - confirm_password
      - new_password
      - old_password
    UpdateProfileUser:
      type: object
      description: |-
        Actualiza la información del perfil del usuario, incluyendo validación
        de documentos oficiales (DNI, CUIT, Pasaporte).
      properties:
        type_document:
          allOf:
          - $ref: '#/components/schemas/TypeDocumentEnum'
          title: Tipo de documento
        document:
          type: string
          title: Identificación
        country:
          type: integer
          title: Seleccionar provincia
        address:
          type: string
          title: Domicilio
        marital_status:
          allOf:
          - $ref: '#/components/schemas/MaritalStatusEnum'
          title: Estado civil
      required:
      - address
      - country
      - document
      - marital_status
      - type_document
    UpdateUser:
      type: object
      description: |-
        Permite actualizar los datos básicos del usuario (Nombre, Apellido, Email).
        Mantiene el ID y el Username como campos de solo lectura por seguridad.
      properties:
        id:
          type: integer
          readOnly: true
        username:
          type: string
          title: Nombre de usuario
          description: 'Requerido. 150 carácteres como máximo. Únicamente letras,
            dígitos y @/./+/-/_ '
          readOnly: true
        first_name:
          type: string
          title: Nombre
        last_name:
          type: string
          title: Apellido
        email:
          type: string
          format: email
          title: Correo electronico
      required:
      - email
      - first_name
      - id
      - last_name
      - username
  securitySchemes:
    jwtAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
